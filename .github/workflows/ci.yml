# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE:
#   Continuous Integration pipeline. Runs on EVERY push to ANY branch and on
#   every pull request targeting main. Its job is to catch bugs before they
#   reach the main branch. It does NOT deploy anything.
#
# USED BY:
#   GitHub — triggered automatically on push/PR events.
#   Developers — check this passes before merging any PR.
#
# ACTION VERSIONS — all pinned to versions that natively run on Node.js 24:
#   actions/checkout@v4      → v4.2.2+ backported Node.js 24, v6 is latest
#                              Using v4 as it's stable and widely tested.
#                              Upgrade to v6 when ready (breaking: credential storage changed)
#   actions/setup-python@v5  → Node.js 24 native
#   google-github-actions/auth is NOT used in CI — only in CD
# ─────────────────────────────────────────────────────────────────────────────

name: CI — lint, type check, test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    # ── Postgres service container ─────────────────────────────────────────────
    # GitHub Actions spins this up alongside the job.
    # Django needs a real database to run migrations and tests against.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: zeitgeist_test
          POSTGRES_USER: zeitgeist
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # ── Environment variables ──────────────────────────────────────────────────
    # Injected directly — no .env file in CI.
    # load_dotenv() in development.py is a no-op when vars are already set.
    # Dummy values for Reddit/Google — tests never actually call those APIs.
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-test-secret-key-not-used-in-production-min-50-chars
      DB_NAME: zeitgeist_test
      DB_USER: zeitgeist
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: "5432"
      REDDIT_CLIENT_ID: dummy
      REDDIT_CLIENT_SECRET: dummy
      REDDIT_USER_AGENT: zeitgeist/0.1 by ci
      GOOGLE_CLIENT_ID: dummy
      GOOGLE_CLIENT_SECRET: dummy

    steps:

      # ── Step 1: Check out code ─────────────────────────────────────────────
      # v4 — stable, Node.js 24 compatible via backport in v4.2.2+
      - uses: actions/checkout@v4

      # ── Step 2: Install Python 3.12 ───────────────────────────────────────
      # v5 — natively runs on Node.js 24
      # Pins to 3.12 to match python:3.12-slim in the Dockerfile.
      # cache: pip speeds up installs when requirements files haven't changed.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── Step 3: Install dependencies ──────────────────────────────────────
      # requirements-dev.txt includes requirements.txt via -r.
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # ── Step 4: Lint with ruff ─────────────────────────────────────────────
      # Checks code style and unused imports. Config in pyproject.toml.
      - name: Lint (ruff)
        run: ruff check .

      # ── Step 5: Type check with mypy ──────────────────────────────────────
      # Reads type annotations, catches type errors at CI time not runtime.
      - name: Type check (mypy)
        run: mypy apps config

      # ── Step 6: Run migrations ────────────────────────────────────────────
      # Applies all migration files against the CI Postgres container.
      # Catches broken migrations before they reach production.
      - name: Run migrations
        run: python manage.py migrate

      # ── Step 7: Run tests ─────────────────────────────────────────────────
      # pytest discovers test_*.py files and checks coverage threshold.
      # Config in pyproject.toml [tool.pytest.ini_options].
      - name: Run tests
        run: pytest
