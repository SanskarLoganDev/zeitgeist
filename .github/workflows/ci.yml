# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE:
#   Continuous Integration pipeline. Runs on EVERY push to ANY branch and on
#   every pull request targeting main. Its job is to catch bugs before they
#   reach the main branch. It does NOT deploy anything.
#
# USED BY:
#   GitHub — triggered automatically on push/PR events.
#   Developers — check this passes before merging any PR.
#
# ACTION VERSIONS:
#   actions/checkout@v4     — v4.2.2+ backported Node.js 24 compatibility
#   actions/setup-python@v5 — natively runs on Node.js 24
#
# NODE.JS 24 NOTE:
#   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 is set at the workflow level.
#   This is the opt-in mechanism recommended by GitHub while the Actions
#   ecosystem migrates from Node.js 20 to Node.js 24.
#   Reference: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
#   Remove this env block once GitHub makes Node.js 24 the default (June 2026).
# ─────────────────────────────────────────────────────────────────────────────

name: CI — lint, type check, test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Opt into Node.js 24 runtime for all JavaScript-based actions in this workflow.
# GitHub recommends this as the correct migration path — not a workaround.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    # ── Postgres service container ─────────────────────────────────────────────
    # GitHub Actions spins this up alongside the job.
    # Django needs a real database to run migrations and tests against.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: zeitgeist_test
          POSTGRES_USER: zeitgeist
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # ── Environment variables ──────────────────────────────────────────────────
    # Injected directly — no .env file in CI.
    # load_dotenv() in development.py is a no-op when vars are already set.
    # Dummy values for Google — tests never actually call that API.
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-test-secret-key-not-used-in-production-min-50-chars
      DB_NAME: zeitgeist_test
      DB_USER: zeitgeist
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: "5432"
      GOOGLE_CLIENT_ID: dummy
      GOOGLE_CLIENT_SECRET: dummy

    steps:

      # ── Step 1: Check out code ─────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Step 2: Install Python 3.12 ───────────────────────────────────────
      # Pins to 3.12 to match python:3.12-slim in the Dockerfile.
      # cache: pip speeds up installs when requirements files haven't changed.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── Step 3: Install dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # ── Step 4: Lint with ruff ─────────────────────────────────────────────
      - name: Lint (ruff)
        run: ruff check .

      # ── Step 5: Type check with mypy ──────────────────────────────────────
      - name: Type check (mypy)
        run: mypy apps config

      # ── Step 6: Run migrations ────────────────────────────────────────────
      - name: Run migrations
        run: python manage.py migrate

      # ── Step 7: Run tests ─────────────────────────────────────────────────
      - name: Run tests
        run: pytest
