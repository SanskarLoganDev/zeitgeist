# .github/workflows/cd.yml
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE:
#   Continuous Deployment pipeline. Runs ONLY when code is merged (pushed) to
#   the main branch. It builds Docker images, pushes them to GCP Artifact
#   Registry, runs database migrations safely, deploys both the API server and
#   ingestion job to Cloud Run, then verifies the deployment with a smoke test.
#
# USED BY:
#   GitHub — triggered automatically on push to main.
#   Only runs after a PR is merged — you never push directly to main.
#
# REQUIRES (GitHub repo → Settings → Secrets → Actions):
#   GCP_PROJECT_ID              : your GCP project ID
#   GCP_WORKLOAD_IDENTITY_PROVIDER : Workload Identity Federation provider name
#   GCP_DEPLOY_SA_EMAIL         : service account used by GitHub Actions to deploy
#   GCP_APP_SA_EMAIL            : service account the running Cloud Run services use
#   CLOUD_SQL_CONNECTION_NAME   : from `terraform output cloud_sql_connection_name`
#
# WHY WORKLOAD IDENTITY FEDERATION (WIF) INSTEAD OF A JSON KEY?
#   The traditional approach stores a GCP service account JSON key in GitHub Secrets.
#   That key is a long-lived credential — if it leaks, an attacker has permanent access.
#   WIF exchanges GitHub's short-lived OIDC token (valid for 1 job run only) for a
#   short-lived GCP access token. Nothing to leak, nothing to rotate, nothing to expire.
# ─────────────────────────────────────────────────────────────────────────────

name: CD — build, push, deploy to Cloud Run

# ── When to run ───────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]    # ONLY on pushes to main (i.e. when a PR is merged)

# ── Permissions ───────────────────────────────────────────────────────────────
# GitHub Actions needs these permissions to request an OIDC token for WIF.
# contents: read  → read the repository code (needed for checkout)
# id-token: write → request an OIDC token from GitHub to exchange with GCP
permissions:
  contents: read
  id-token: write

# ── Global environment variables ─────────────────────────────────────────────
# Available to all steps in all jobs.
# ${{ secrets.X }} reads from GitHub repo Secrets — never visible in logs.
env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev      # Artifact Registry hostname for this region
  REPO: ${{ secrets.GCP_PROJECT_ID }}/zeitgeist  # <project-id>/zeitgeist inside the registry

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Check out the code ──────────────────────────────────────────
      # Same as CI — clones the repo onto the runner so we can build Docker images.
      - uses: actions/checkout@v4

      # ── Step 2: Authenticate to GCP via Workload Identity Federation ─────────
      # This step exchanges the GitHub OIDC token for a short-lived GCP access token.
      # After this step, all `gcloud` and `docker` commands are authenticated to GCP.
      # No JSON key is stored anywhere.
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          # Format: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}
          # The service account GitHub Actions impersonates for this deployment.
          # It needs roles: run.developer, storage.admin, artifactregistry.writer

      # ── Step 3: Install the Google Cloud SDK (gcloud CLI) ────────────────────
      # Provides the `gcloud` command used in later steps to deploy to Cloud Run.
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Step 4: Configure Docker to push to Artifact Registry ────────────────
      # Docker needs credentials to push images to GCP's container registry.
      # This command tells Docker to use gcloud's credentials for our registry host.
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
        # --quiet suppresses the interactive confirmation prompt

      # ── Step 5: Build the API server Docker image ─────────────────────────────
      # Builds backend/Dockerfile — the multi-stage image for the Django API server.
      # Tagged with TWO tags:
      #   :${{ github.sha }}  — the exact git commit SHA (e.g. :a3f9c12...)
      #                         Immutable. Used for the actual Cloud Run deployment
      #                         so we always know exactly which commit is live.
      #   :latest             — mutable pointer to the most recent build.
      #                         Used for convenience (e.g. local pulls).
      - name: Build API image
        working-directory: backend
        run: |
          docker build \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/api:latest \
            --file Dockerfile \
            .

      # ── Step 6: Push the API image to Artifact Registry ──────────────────────
      # Uploads both tags. The registry stores the image; Cloud Run pulls from it.
      - name: Push API image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/api:latest

      # ── Step 7: Build the ingestion job Docker image ──────────────────────────
      # Builds backend/Dockerfile.job — the separate image for the ingestion job.
      # Kept separate from the API image so a broken ingestion deploy cannot
      # take down the API server. They are independent Cloud Run services.
      - name: Build ingestion job image
        working-directory: backend
        run: |
          docker build \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/job:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/job:latest \
            --file Dockerfile.job \
            .

      # ── Step 8: Push the ingestion job image ──────────────────────────────────
      - name: Push ingestion job image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/job:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/job:latest

      # ── Step 9: Run database migrations BEFORE switching traffic ─────────────
      # This is a critical safety step. The sequence is:
      #   1. New image is built (may contain new migration files)
      #   2. Migrations run against the live database (this step)
      #   3. Only THEN does traffic switch to the new image (step 10)
      #
      # Why run migrations separately as a Cloud Run Job?
      #   If migrations ran inside the API container at startup, two problems arise:
      #     a) Two containers starting simultaneously both try to run migrations → race condition
      #     b) If migrations fail mid-way, the API is already serving traffic against a broken schema
      #   Running as a one-off Cloud Run Job with --wait blocks this workflow until
      #   migrations succeed before we touch the running service.
      #
      # gcloud run jobs create creates a one-off migration job then executes it.
      # --execute-now  : run it immediately
      # --wait         : block this step until the job completes (success or failure)
      # If the job exits non-zero, this step fails and the deploy stops — safe.
      - name: Run database migrations
        run: |
          gcloud run jobs create zeitgeist-migrate-${{ github.run_number }} \
            --image ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --command "python" \
            --args "manage.py,migrate,--noinput" \
            --set-cloudsql-instances ${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
            --service-account ${{ secrets.GCP_APP_SA_EMAIL }} \
            --set-secrets "DJANGO_SECRET_KEY=django-secret-key:latest,DB_PASSWORD=db-password:latest" \
            --set-env-vars "DB_HOST=/cloudsql/${{ secrets.CLOUD_SQL_CONNECTION_NAME }},DB_NAME=zeitgeist,DB_USER=zeitgeist,DJANGO_SETTINGS_MODULE=config.settings.production" \
            --max-retries 1 \
            --execute-now \
            --wait

      # ── Step 10: Deploy the new API image to Cloud Run ────────────────────────
      # `gcloud run services update` tells Cloud Run to create a new revision
      # using the new image. Cloud Run performs a zero-downtime rolling update:
      #   - Starts new containers with the new image
      #   - Waits until they pass the startup probe (GET /api/v1/health/)
      #   - Shifts traffic to the new containers
      #   - Terminates the old containers
      # If the new containers fail the startup probe, Cloud Run automatically
      # keeps serving the previous revision — no downtime even on bad deploys.
      - name: Deploy API to Cloud Run
        run: |
          gcloud run services update zeitgeist-api \
            --image ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }}

      # ── Step 11: Update the ingestion job image ────────────────────────────────
      # The ingestion job is a Cloud Run Job, not a Service.
      # `gcloud run jobs update` updates the job definition with the new image.
      # The job doesn't run here — it still runs on the Cloud Scheduler trigger at 3am UTC.
      # This just ensures that the NEXT time Cloud Scheduler fires, it uses the new image.
      - name: Update ingestion job image
        run: |
          gcloud run jobs update zeitgeist-ingest \
            --image ${{ env.REGISTRY }}/${{ env.REPO }}/job:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }}

      # ── Step 12: Smoke test ────────────────────────────────────────────────────
      # After deploying, verify the live API is actually responding correctly.
      # Steps:
      #   1. Ask gcloud for the Cloud Run service URL
      #   2. Hit /api/v1/health/ with curl
      #   3. If we get anything other than 200, fail the step
      # Note: Cloud Run still serves the PREVIOUS revision if the new one didn't start.
      # A 200 here confirms the NEW revision is up and the health check passes.
      - name: Smoke test — health check
        run: |
          API_URL=$(gcloud run services describe zeitgeist-api \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "Deployed to: $API_URL"
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$API_URL/api/v1/health/")
          echo "Health check HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Health check failed with status $STATUS"
            echo "Cloud Run will continue serving the previous revision."
            exit 1
          fi
          echo "SUCCESS: Deployment complete and healthy."
