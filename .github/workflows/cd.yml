# .github/workflows/cd.yml
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE:
#   Continuous Deployment pipeline. Runs ONLY on pushes to main.
#   Builds Docker images, pushes to GCP Artifact Registry, runs database
#   migrations safely, deploys to Cloud Run, smoke tests the deployment.
#
# GITHUB SECRETS REQUIRED (repo → Settings → Secrets → Actions):
#   GCP_PROJECT_ID                 : your GCP project ID
#   GCP_WORKLOAD_IDENTITY_PROVIDER : WIF provider resource name
#   GCP_DEPLOY_SA_EMAIL            : service account GitHub Actions impersonates
#   GCP_APP_SA_EMAIL               : service account Cloud Run services run as
#   CLOUD_SQL_CONNECTION_NAME      : from `terraform output cloud_sql_connection_name`
# ─────────────────────────────────────────────────────────────────────────────

name: CD — build, push, deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: us-central1
      REGISTRY: us-central1-docker.pkg.dev
      REPO: ${{ secrets.GCP_PROJECT_ID }}/zeitgeist

    steps:

      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build API image
        working-directory: backend
        run: |
          docker build \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/api:latest \
            --file Dockerfile \
            .

      - name: Push API image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/api:latest

      - name: Build ingestion job image
        working-directory: backend
        run: |
          docker build \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/job:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/job:latest \
            --file Dockerfile.job \
            .

      - name: Push ingestion job image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/job:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/job:latest

      - name: Build frontend image
        working-directory: frontend
        run: |
          API_URL=$(gcloud run services describe zeitgeist-api \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')

          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL="$API_URL/api/v1" \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/frontend:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/frontend:latest \
            --file Dockerfile \
            .

      - name: Push frontend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/frontend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/frontend:latest

      # ── Run database setup BEFORE switching traffic ─────────────────────────
      # ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS, and CSRF_TRUSTED_ORIGINS must be set
      # even for the migration job — Django runs system checks at startup before
      # management commands run.
      # This reuses one Cloud Run Job instead of creating zeitgeist-migrate-N on
      # every deploy.
      - name: Ensure database maintenance job exists
        run: |
          if gcloud run jobs describe zeitgeist-db-maintenance \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} >/dev/null 2>&1; then
            echo "Database maintenance job already exists"
          else
            gcloud run jobs create zeitgeist-db-maintenance \
              --image ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }} \
              --region ${{ env.GCP_REGION }} \
              --project ${{ env.GCP_PROJECT_ID }} \
              --command "python" \
              --args "manage.py,check,--deploy" \
              --set-cloudsql-instances ${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
              --service-account ${{ secrets.GCP_APP_SA_EMAIL }} \
              --set-secrets "DJANGO_SECRET_KEY=django-secret-key:latest,DB_PASSWORD=db-password:latest" \
              --set-env-vars "DB_HOST=/cloudsql/${{ secrets.CLOUD_SQL_CONNECTION_NAME }},DB_NAME=zeitgeist,DB_USER=zeitgeist,DJANGO_SETTINGS_MODULE=config.settings.production,ALLOWED_HOSTS=localhost,CORS_ALLOWED_ORIGINS=http://localhost:3000,CSRF_TRUSTED_ORIGINS=http://localhost:3000" \
              --max-retries 1
          fi

      - name: Run database migrations
        run: |
          gcloud run jobs update zeitgeist-db-maintenance \
            --image ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --command "python" \
            --args "manage.py,migrate,--noinput" \
            --set-cloudsql-instances ${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
            --service-account ${{ secrets.GCP_APP_SA_EMAIL }} \
            --set-secrets "DJANGO_SECRET_KEY=django-secret-key:latest,DB_PASSWORD=db-password:latest" \
            --set-env-vars "DB_HOST=/cloudsql/${{ secrets.CLOUD_SQL_CONNECTION_NAME }},DB_NAME=zeitgeist,DB_USER=zeitgeist,DJANGO_SETTINGS_MODULE=config.settings.production,ALLOWED_HOSTS=localhost,CORS_ALLOWED_ORIGINS=http://localhost:3000,CSRF_TRUSTED_ORIGINS=http://localhost:3000" \
            --max-retries 1
          gcloud run jobs execute zeitgeist-db-maintenance \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --wait

      - name: Seed starter categories
        run: |
          gcloud run jobs update zeitgeist-db-maintenance \
            --image ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --command "python" \
            --args "manage.py,seed_categories" \
            --set-cloudsql-instances ${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
            --service-account ${{ secrets.GCP_APP_SA_EMAIL }} \
            --set-secrets "DJANGO_SECRET_KEY=django-secret-key:latest,DB_PASSWORD=db-password:latest" \
            --set-env-vars "DB_HOST=/cloudsql/${{ secrets.CLOUD_SQL_CONNECTION_NAME }},DB_NAME=zeitgeist,DB_USER=zeitgeist,DJANGO_SETTINGS_MODULE=config.settings.production,ALLOWED_HOSTS=localhost,CORS_ALLOWED_ORIGINS=http://localhost:3000,CSRF_TRUSTED_ORIGINS=http://localhost:3000" \
            --max-retries 1
          gcloud run jobs execute zeitgeist-db-maintenance \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --wait

      # ── Deploy frontend to Cloud Run ────────────────────────────────────────
      # The Next.js app is deployed as its own public Cloud Run service. The API
      # URL is baked into the browser bundle at build time and also provided at
      # runtime for server-rendered requests.
      - name: Deploy frontend to Cloud Run
        run: |
          API_URL=$(gcloud run services describe zeitgeist-api \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')

          gcloud run deploy zeitgeist-frontend \
            --image ${{ env.REGISTRY }}/${{ env.REPO }}/frontend:${{ github.sha }} \
            --port 3000 \
            --allow-unauthenticated \
            --service-account ${{ secrets.GCP_APP_SA_EMAIL }} \
            --min-instances 1 \
            --set-env-vars "NEXT_PUBLIC_API_BASE_URL=$API_URL/api/v1" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }}

      # ── Deploy API to Cloud Run ─────────────────────────────────────────────
      # --port 8000 tells Cloud Run our app listens on port 8000 not the default
      # 8080. Without this, Cloud Run's startup probe checks port 8080, gets no
      # response, and marks the container unhealthy after 4 minutes.
      # --set-secrets attaches populated Secret Manager versions to the real
      # Django revision. Terraform intentionally does not attach these during
      # initial infrastructure bootstrap because secret versions do not exist yet.
      - name: Deploy API to Cloud Run
        run: |
          API_URL=$(gcloud run services describe zeitgeist-api \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          API_HOST=${API_URL#https://}
          FRONTEND_URL=$(gcloud run services describe zeitgeist-frontend \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.GCP_PROJECT_ID }} \
            --format 'value(projectNumber)')
          FRONTEND_REGIONAL_URL="https://zeitgeist-frontend-$PROJECT_NUMBER.${{ env.GCP_REGION }}.run.app"
          TRUSTED_ORIGINS="http://localhost:3000,$FRONTEND_URL,$FRONTEND_REGIONAL_URL"

          gcloud run services update zeitgeist-api \
            --image ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }} \
            --port 8000 \
            --min-instances 1 \
            --set-secrets "DJANGO_SECRET_KEY=django-secret-key:latest,DB_PASSWORD=db-password:latest,EMAIL_HOST=smtp-host:latest,EMAIL_HOST_USER=smtp-host-user:latest,EMAIL_HOST_PASSWORD=smtp-host-password:latest" \
            --set-env-vars "^|^DB_HOST=/cloudsql/${{ secrets.CLOUD_SQL_CONNECTION_NAME }}|DB_NAME=zeitgeist|DB_USER=zeitgeist|DJANGO_SETTINGS_MODULE=config.settings.production|ALLOWED_HOSTS=$API_HOST|CORS_ALLOWED_ORIGINS=$TRUSTED_ORIGINS|CSRF_TRUSTED_ORIGINS=$TRUSTED_ORIGINS|EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend|EMAIL_PORT=587|EMAIL_USE_TLS=true|EMAIL_USE_SSL=false|EMAIL_VERIFICATION_OTP_TTL_MINUTES=10|EMAIL_VERIFICATION_MAX_ATTEMPTS=5|EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS=60|AUTH_RATE_LIMIT_WINDOW_SECONDS=60|AUTH_RATE_LIMIT_IP_REQUESTS=30|AUTH_RATE_LIMIT_EMAIL_REQUESTS=10" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }}

      - name: Update ingestion job image
        run: |
          gcloud run jobs update zeitgeist-ingest \
            --image ${{ env.REGISTRY }}/${{ env.REPO }}/job:${{ github.sha }} \
            --set-secrets "DJANGO_SECRET_KEY=django-secret-key:latest,DB_PASSWORD=db-password:latest,NYTIMES_API_KEY=nytimes-api-key:latest,RAWG_API_KEY=rawg-api-key:latest,FOOTBALL_DATA_API_KEY=football-data-api-key:latest" \
            --set-env-vars "DB_HOST=/cloudsql/${{ secrets.CLOUD_SQL_CONNECTION_NAME }},DB_NAME=zeitgeist,DB_USER=zeitgeist,DJANGO_SETTINGS_MODULE=config.settings.production,GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT_ID }},GOOGLE_CLOUD_LOCATION=global,GOOGLE_GENAI_USE_ENTERPRISE=True,AI_SUMMARIES_ENABLED=true,GEMINI_MODEL=gemini-3.5-flash" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }}

      # ── Smoke test ─────────────────────────────────────────────────────────
      - name: Smoke test — health check
        run: |
          API_URL=$(gcloud run services describe zeitgeist-api \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          FRONTEND_URL=$(gcloud run services describe zeitgeist-frontend \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "Deployed to: $API_URL"
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$API_URL/api/v1/health/")
          echo "Health check HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Health check failed — Cloud Run serving previous revision"
            exit 1
          fi
          echo "Frontend deployed to: $FRONTEND_URL"
          FRONTEND_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$FRONTEND_URL")
          echo "Frontend HTTP status: $FRONTEND_STATUS"
          if [ "$FRONTEND_STATUS" != "200" ]; then
            echo "ERROR: Frontend smoke test failed"
            exit 1
          fi
          echo "SUCCESS: Deployment complete and healthy"
