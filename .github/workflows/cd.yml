# .github/workflows/cd.yml
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE:
#   Continuous Deployment pipeline. Runs ONLY on pushes to main.
#   Builds Docker images, pushes to GCP Artifact Registry, runs database
#   migrations safely, deploys to Cloud Run, smoke tests the deployment.
#
# CURRENT STATUS:
#   The deploy steps will fail until GCP is configured:
#     - terraform apply run
#     - Secrets set in Secret Manager
#     - GitHub Actions secrets added to the repo
#   This is expected and harmless before GCP setup is complete.
#
# GITHUB SECRETS REQUIRED (repo → Settings → Secrets → Actions):
#   GCP_PROJECT_ID                 : your GCP project ID
#   GCP_WORKLOAD_IDENTITY_PROVIDER : WIF provider resource name
#   GCP_DEPLOY_SA_EMAIL            : service account GitHub Actions impersonates
#   GCP_APP_SA_EMAIL               : service account Cloud Run services run as
#   CLOUD_SQL_CONNECTION_NAME      : from `terraform output cloud_sql_connection_name`
#
# ACTION VERSIONS — all natively run on Node.js 24, no workarounds needed:
#   actions/checkout@v4                  — v4.2.2+ Node.js 24 compatible
#   google-github-actions/auth@v3        — Node.js 24 native (upgraded from v2)
#   google-github-actions/setup-gcloud@v2 — stable, Node.js 24 compatible
#
# WHY WORKLOAD IDENTITY FEDERATION (not a JSON key):
#   WIF exchanges GitHub's short-lived OIDC token for a short-lived GCP token.
#   Nothing to leak, nothing to rotate. No JSON key stored anywhere.
# ─────────────────────────────────────────────────────────────────────────────

name: CD — build, push, deploy to Cloud Run

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write    # Required for Workload Identity Federation OIDC token

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: us-central1
      REGISTRY: us-central1-docker.pkg.dev
      REPO: ${{ secrets.GCP_PROJECT_ID }}/zeitgeist

    steps:

      # ── Step 1: Check out code ─────────────────────────────────────────────
      # v4 — stable, Node.js 24 compatible via backport in v4.2.2+
      - uses: actions/checkout@v4

      # ── Step 2: Authenticate to GCP via Workload Identity Federation ───────
      # google-github-actions/auth@v3 — natively runs on Node.js 24.
      # Upgraded from v2 which used Node.js 20.
      # Exchanges the GitHub OIDC token for a short-lived GCP access token.
      # After this step, all gcloud and docker push commands are authenticated.
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      # ── Step 3: Install gcloud CLI ─────────────────────────────────────────
      # google-github-actions/setup-gcloud@v2 — stable, Node.js 24 compatible.
      # Provides the `gcloud` command used in later deploy steps.
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Step 4: Configure Docker to push to Artifact Registry ──────────────
      # Tells Docker to use gcloud credentials for our registry hostname.
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── Step 5: Build API server image ─────────────────────────────────────
      # Builds backend/Dockerfile — the Django API server image.
      # Tagged with:
      #   :${{ github.sha }} — immutable, tied to exact commit, used for deploy
      #   :latest            — mutable pointer, used for convenience
      - name: Build API image
        working-directory: backend
        run: |
          docker build \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/api:latest \
            --file Dockerfile \
            .

      # ── Step 6: Push API image ─────────────────────────────────────────────
      - name: Push API image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/api:latest

      # ── Step 7: Build ingestion job image ───────────────────────────────────
      # Separate image — uses Dockerfile.job.
      # A broken ingestion deploy cannot take down the running API server.
      - name: Build ingestion job image
        working-directory: backend
        run: |
          docker build \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/job:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.REPO }}/job:latest \
            --file Dockerfile.job \
            .

      # ── Step 8: Push ingestion job image ────────────────────────────────────
      - name: Push ingestion job image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/job:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}/job:latest

      # ── Step 9: Run database migrations BEFORE switching traffic ────────────
      # Safety sequence:
      #   1. New image built (may contain new migration files)
      #   2. Migrations run against live DB here — blocks until complete
      #   3. Only then does traffic shift to new revision (Step 10)
      #
      # Why a Cloud Run Job, not running migrate at container startup?
      #   - Two containers starting simultaneously would race to migrate
      #   - If migrations fail, the API is NOT serving new code yet → safe
      #   --execute-now --wait blocks this step until job completes or fails
      - name: Run database migrations
        run: |
          gcloud run jobs create zeitgeist-migrate-${{ github.run_number }} \
            --image ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --command "python" \
            --args "manage.py,migrate,--noinput" \
            --set-cloudsql-instances ${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
            --service-account ${{ secrets.GCP_APP_SA_EMAIL }} \
            --set-secrets "DJANGO_SECRET_KEY=django-secret-key:latest,DB_PASSWORD=db-password:latest" \
            --set-env-vars "DB_HOST=/cloudsql/${{ secrets.CLOUD_SQL_CONNECTION_NAME }},DB_NAME=zeitgeist,DB_USER=zeitgeist,DJANGO_SETTINGS_MODULE=config.settings.production" \
            --max-retries 1 \
            --execute-now \
            --wait

      # ── Step 10: Deploy API to Cloud Run ────────────────────────────────────
      # Zero-downtime rolling update:
      #   - Cloud Run starts containers with the new image
      #   - Waits until startup probe passes (GET /api/v1/health/)
      #   - Shifts 100% traffic to new revision
      #   - If probe fails, old revision keeps serving — no downtime
      - name: Deploy API to Cloud Run
        run: |
          gcloud run services update zeitgeist-api \
            --image ${{ env.REGISTRY }}/${{ env.REPO }}/api:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }}

      # ── Step 11: Update ingestion job image ─────────────────────────────────
      # Updates the job definition only — does NOT execute the job.
      # Cloud Scheduler still triggers it at 03:00 UTC.
      # Next trigger will use this new image.
      - name: Update ingestion job image
        run: |
          gcloud run jobs update zeitgeist-ingest \
            --image ${{ env.REGISTRY }}/${{ env.REPO }}/job:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }}

      # ── Step 12: Smoke test ─────────────────────────────────────────────────
      # Hits the live health check after deployment.
      # 200 = new revision is up and serving correctly.
      # Non-200 = Cloud Run continues serving previous revision.
      - name: Smoke test — health check
        run: |
          API_URL=$(gcloud run services describe zeitgeist-api \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "Deployed to: $API_URL"
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$API_URL/api/v1/health/")
          echo "Health check HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Health check failed — Cloud Run serving previous revision"
            exit 1
          fi
          echo "SUCCESS: Deployment complete and healthy"
