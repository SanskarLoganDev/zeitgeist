# Local development docker-compose
# ─────────────────────────────────────────────────────────────────────────────
# Purpose : Spins up a local Postgres 16 container for development.
#
# NOTE — Current local dev setup:
#   Docker Hub is unreachable on the UMD university network.
#   Until network access to Docker Hub is available, use a direct Postgres
#   installation instead of this file.
#
#   Direct Postgres setup (Windows):
#     1. Install Postgres 16 from enterprisedb.com to E:\PostgreSQL\16
#     2. Password: zeitgeist_dev, Port: 5432
#     3. In psql:
#          CREATE USER zeitgeist WITH PASSWORD 'zeitgeist_dev';
#          CREATE DATABASE zeitgeist OWNER zeitgeist;
#          GRANT ALL PRIVILEGES ON DATABASE zeitgeist TO zeitgeist;
#     4. python manage.py migrate
#
#   When Docker Hub is accessible (e.g. on a different network or via hotspot):
#     docker compose up -d
#
# Why postgres:16-alpine:
#   Version 16 matches GCP Cloud SQL (POSTGRES_16 in Terraform).
#   Local dev must match production to avoid version-specific behaviour gaps.
#   alpine variant = same Postgres, ~85MB instead of ~425MB (Debian).
#
# Usage (when Docker is available):
#   docker compose up -d        start Postgres in background
#   docker compose ps           check it is healthy
#   docker compose down         stop (keeps data in postgres_data volume)
#   docker compose down -v      stop AND wipe the database (fresh start)
#   docker compose logs db      see Postgres logs
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zeitgeist
      POSTGRES_USER: zeitgeist
      POSTGRES_PASSWORD: zeitgeist_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeitgeist"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Phase 2: Redis cache ──────────────────────────────────────────────────
  # Uncomment when Memorystore (Redis) is added in Phase 2.
  # Version 7 matches GCP Memorystore for Redis 7.x.
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

volumes:
  postgres_data:
